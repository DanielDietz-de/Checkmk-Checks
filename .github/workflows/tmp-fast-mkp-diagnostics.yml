name: Temporary fast MKP diagnostics

on:
  pull_request:
    paths:
      - ".github/workflows/tmp-fast-mkp-diagnostics.yml"

permissions:
  contents: read

env:
  DIST_DIR: dist/repository-mkps

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: 2.5.0p9
            image: checkmk/check-mk-community:2.5.0p9

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package set
        run: |
          set -euo pipefail
          python .github/scripts/prepare_repository_mkp_release.py --repository .
          python .github/scripts/build_repository_mkps.py \
            --repository . \
            --output "$DIST_DIR" \
            --packaged-version 2.5.0p9 \
            --usable-until 2.5.99

      - name: Start Checkmk
        env:
          CHECKMK_IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          docker run --detach \
            --name checkmk-fast-diagnostics \
            --env CMK_PASSWORD='fast-diagnostics-password' \
            --env CMK_SITE_ID='cmk' \
            --volume "$GITHUB_WORKSPACE:/work:ro" \
            "$CHECKMK_IMAGE"
          for _ in $(seq 1 120); do
            if docker logs checkmk-fast-diagnostics 2>&1 | grep -q '### CONTAINER STARTED'; then
              exit 0
            fi
            sleep 2
          done
          docker logs checkmk-fast-diagnostics
          exit 1

      - name: Install all supported packages and capture validation
        id: validation
        continue-on-error: true
        env:
          CHECKMK_VERSION: ${{ matrix.label }}
        run: |
          set -o pipefail
          docker exec --user cmk checkmk-fast-diagnostics bash -lc \
            "python3 - /work/${DIST_DIR} ${CHECKMK_VERSION}" \
            > "fast-validation-${CHECKMK_VERSION}.log" 2>&1 <<'PY'
          import ast
          import json
          import re
          import subprocess
          import sys
          import tarfile
          from pathlib import Path, PurePosixPath

          dist = Path(sys.argv[1])
          target = sys.argv[2]

          def key(value):
              match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)(?:(b|rc|p)(\d+))?", value)
              if not match:
                  raise ValueError(value)
              rank = {"b": 0, "rc": 1, None: 2, "p": 3}[match.group(4)]
              return tuple(map(int, match.group(1, 2, 3))) + (rank, int(match.group(5) or 0))

          packages = json.loads((dist / "packages.json").read_text())
          manuals = set()
          failures = []
          for package in packages:
              if key(package["min_required"]) > key(target):
                  continue
              path = dist / package["path"]
              print(f"INSTALL {package['package_dir']} {package['name']} {package['version']}", flush=True)
              for command in (
                  ["mkp", "add", str(path)],
                  ["mkp", "enable", package["name"], package["version"]],
              ):
                  result = subprocess.run(command, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True)
                  print(result.stdout, end="" if result.stdout.endswith("\n") else "\n")
                  if result.returncode:
                      failures.append((package["package_dir"], command, result.returncode, result.stdout))
                      break
              with tarfile.open(path, "r:gz") as archive:
                  member = next(m for m in archive.getmembers() if PurePosixPath(m.name).name == "info")
                  manifest = ast.literal_eval(archive.extractfile(member).read().decode())
              for entry in manifest.get("files", {}).get("cmk_addons_plugins", []):
                  relative = PurePosixPath(entry)
                  if "checkman" in relative.parts:
                      manuals.add(relative.name)
              for entry in manifest.get("files", {}).get("checkman", []):
                  manuals.add(PurePosixPath(entry).name)

          for command in [["cmk-validate-plugins"], *[["cmk", "-M", name] for name in sorted(manuals)], ["cmk", "-R"]]:
              print("GLOBAL", " ".join(command), flush=True)
              result = subprocess.run(command, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True)
              print(result.stdout, end="" if result.stdout.endswith("\n") else "\n")
              if result.returncode:
                  failures.append(("<repository>", command, result.returncode, result.stdout))

          if failures:
              print("=== FAILURES ===", file=sys.stderr)
              for package, command, code, output in failures:
                  print(f"PACKAGE={package} CODE={code} COMMAND={' '.join(command)}", file=sys.stderr)
                  print(output.rstrip(), file=sys.stderr)
              raise SystemExit(1)
          PY

      - name: Upload complete diagnostic log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fast-validation-${{ matrix.label }}
          path: fast-validation-${{ matrix.label }}.log
          if-no-files-found: error
          retention-days: 1

      - name: Report failure
        if: steps.validation.outcome == 'failure'
        env:
          CHECKMK_VERSION: ${{ matrix.label }}
        run: |
          tail -n 300 "fast-validation-${CHECKMK_VERSION}.log"
          exit 1

      - name: Remove Checkmk
        if: always()
        run: docker rm --force checkmk-fast-diagnostics || true
