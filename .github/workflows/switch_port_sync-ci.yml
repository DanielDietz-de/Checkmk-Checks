name: switch_port_sync checks

on:
  pull_request:
    paths:
      - "switch_port_sync/**"
      - ".github/workflows/switch_port_sync-ci.yml"
      - ".github/workflows/generated-mkp-ci.yml"
  push:
    branches:
      - master
    paths:
      - "switch_port_sync/**"
      - ".github/workflows/switch_port_sync-ci.yml"
      - ".github/workflows/generated-mkp-ci.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: switch-port-sync-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-package:
    uses: ./.github/workflows/generated-mkp-ci.yml
    with:
      package_dir: switch_port_sync
      package_name: switch_port_sync
      package_source: switch_port_sync/src/switch_port_sync
      package_version: 1.0.2
      package_title: Switch Port Synchronization
      package_author: Daniel Dietz
      package_description: >-
        Compares one-to-one Checkmk interface services on a switch pair through
        Livestatus and reports asymmetric or failed links.
      min_required: 2.4.0p5
      test_dir: switch_port_sync/tests
      caller_workflow: .github/workflows/switch_port_sync-ci.yml
      manual_checks: switch_port_sync
      executable_relpath: libexec/agent_switch_port_sync
