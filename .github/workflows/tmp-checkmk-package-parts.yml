name: Temporary Checkmk package parts

on:
  pull_request:
    paths:
      - ".github/workflows/tmp-checkmk-package-parts.yml"

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Start Checkmk container
        run: |
          set -euo pipefail
          docker run --detach \
            --name checkmk-parts \
            --env CMK_PASSWORD='package-parts-password' \
            --env CMK_SITE_ID='cmk' \
            checkmk/check-mk-community:2.5.0p9
          for _ in $(seq 1 120); do
            if docker logs checkmk-parts 2>&1 | grep -q '### CONTAINER STARTED'; then
              exit 0
            fi
            sleep 2
          done
          docker logs checkmk-parts
          exit 1

      - name: Export component mapping references
        run: |
          set -euo pipefail
          : > package-parts.txt
          docker exec --user cmk checkmk-parts bash -lc '
            set -euo pipefail
            echo "=== mkp help ==="
            mkp --help || true
            echo
            echo "=== package part references ==="
            grep -R -n --include="*.py" \
              -E "cmk_addons_plugins|pnp-rraconf|alert_handlers|PACKAGE_PARTS|PackagePart" \
              "$OMD_ROOT/lib/python3/cmk" "$OMD_ROOT/lib/python3/cmk" 2>/dev/null | head -n 500 || true
            echo
            echo "=== local hierarchy ==="
            find "$OMD_ROOT/local" -maxdepth 5 -type d | sort | head -n 500
          ' > package-parts.txt 2>&1
          docker rm --force checkmk-parts >/dev/null
          cat package-parts.txt

      - name: Upload component mapping
        uses: actions/upload-artifact@v7
        with:
          name: checkmk-package-parts
          path: package-parts.txt
          if-no-files-found: error
          retention-days: 1
