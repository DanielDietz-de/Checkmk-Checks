name: Temporary repository MKP diagnostics

on:
  pull_request:
    paths:
      - ".github/scripts/**"
      - ".github/workflows/tmp-repository-mkp-diagnostics.yml"
      - "*/src/**"

permissions:
  contents: read

concurrency:
  group: repository-mkp-diagnostics-${{ github.ref }}
  cancel-in-progress: true

env:
  DIST_DIR: dist/repository-mkps
  PACKAGED_VERSION: 2.5.0p9
  USABLE_UNTIL: 2.5.99

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      artifact-name: ${{ steps.metadata.outputs.artifact-name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build complete diagnostic package set
        run: |
          set -euo pipefail
          python .github/scripts/prepare_repository_mkp_release.py --repository .
          python .github/scripts/build_repository_mkps.py \
            --repository . \
            --output "$DIST_DIR" \
            --packaged-version "$PACKAGED_VERSION" \
            --usable-until "$USABLE_UNTIL"

      - name: Set artifact name
        id: metadata
        run: echo "artifact-name=repository-mkp-diagnostics-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Upload diagnostic package set
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.metadata.outputs.artifact-name }}
          path: ${{ env.DIST_DIR }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  validate:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: 2.4.0p34
            image: checkmk/check-mk-raw:2.4.0p34
          - label: 2.5.0p9
            image: checkmk/check-mk-community:2.5.0p9

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download diagnostic package set
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: ${{ env.DIST_DIR }}

      - name: Start Checkmk validation container
        env:
          CHECKMK_IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          docker run --detach \
            --name checkmk-repository-diagnostics \
            --env CMK_PASSWORD='repository-mkp-diagnostics-password' \
            --env CMK_SITE_ID='cmk' \
            --volume "$GITHUB_WORKSPACE:/work:ro" \
            "$CHECKMK_IMAGE"

          for _ in $(seq 1 120); do
            if docker logs checkmk-repository-diagnostics 2>&1 | grep -q '### CONTAINER STARTED'; then
              exit 0
            fi
            if ! docker inspect --format '{{.State.Running}}' checkmk-repository-diagnostics | grep -q true; then
              docker logs checkmk-repository-diagnostics
              exit 1
            fi
            sleep 2
          done
          docker logs checkmk-repository-diagnostics
          exit 1

      - name: Capture complete validation output
        id: validation
        continue-on-error: true
        env:
          CHECKMK_VERSION: ${{ matrix.label }}
        run: |
          set -o pipefail
          docker exec --user cmk checkmk-repository-diagnostics bash -lc \
            "python3 /work/.github/scripts/validate_repository_mkps.py \
              --dist /work/${DIST_DIR} \
              --checkmk-version ${CHECKMK_VERSION}" \
            > "repository-validation-${CHECKMK_VERSION}.log" 2>&1

      - name: Upload complete validation output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repository-validation-${{ matrix.label }}
          path: repository-validation-${{ matrix.label }}.log
          if-no-files-found: error
          retention-days: 1

      - name: Report validation failure
        if: steps.validation.outcome == 'failure'
        env:
          CHECKMK_VERSION: ${{ matrix.label }}
        run: |
          tail -n 250 "repository-validation-${CHECKMK_VERSION}.log"
          exit 1

      - name: Remove validation container
        if: always()
        run: docker rm --force checkmk-repository-diagnostics || true
