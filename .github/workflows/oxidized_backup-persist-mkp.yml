name: Persist oxidized_backup MKP

on:
  workflow_run:
    workflows:
      - oxidized_backup checks
    types:
      - completed

permissions:
  actions: read
  contents: write

concurrency:
  group: persist-oxidized-backup-mkp
  cancel-in-progress: false

env:
  PACKAGE_DIR: oxidized_backup
  PACKAGE_NAME: oxidized_backup

jobs:
  persist-mkp:
    name: Commit MKP to package folder
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master' &&
      github.event.workflow_run.actor.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: false

      - name: Reject stale package builds
        id: freshness
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          git fetch origin master

          if git diff --quiet "${SOURCE_SHA}..origin/master" -- \
            "$PACKAGE_DIR" \
            .github/workflows/oxidized_backup-ci.yml; then
            echo "persist=true" >>"$GITHUB_OUTPUT"
          else
            echo "A newer oxidized_backup source or packaging change exists; skipping stale artifact."
            echo "persist=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Download generated MKP
        if: steps.freshness.outputs.persist == 'true'
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.PACKAGE_NAME }}-mkp-${{ github.event.workflow_run.run_number }}
          path: ${{ runner.temp }}/oxidized_backup-mkp
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Verify and stage downloaded package
        if: steps.freshness.outputs.persist == 'true'
        run: |
          set -euo pipefail
          artifact_dir="${RUNNER_TEMP}/oxidized_backup-mkp"

          mapfile -t packages < <(
            find "$artifact_dir" -maxdepth 1 -type f \
              -name "${PACKAGE_NAME}-*.mkp" -printf '%f\n' | sort
          )
          if [ "${#packages[@]}" -ne 1 ]; then
            printf 'Expected exactly one generated MKP, found %s: %s\n' \
              "${#packages[@]}" "${packages[*]-}" >&2
            exit 1
          fi

          package_filename="${packages[0]}"
          checksum_filename="${package_filename}.sha256"
          test -f "${artifact_dir}/${checksum_filename}"
          (
            cd "$artifact_dir"
            sha256sum --check "$checksum_filename"
          )

          package_version="${package_filename#${PACKAGE_NAME}-}"
          package_version="${package_version%.mkp}"
          test -n "$package_version"

          install -m 0644 \
            "${artifact_dir}/${package_filename}" \
            "${PACKAGE_DIR}/${package_filename}"
          install -m 0644 \
            "${artifact_dir}/${checksum_filename}" \
            "${PACKAGE_DIR}/${checksum_filename}"

          echo "PACKAGE_FILENAME=${package_filename}" >>"$GITHUB_ENV"
          echo "PACKAGE_VERSION=${package_version}" >>"$GITHUB_ENV"

      - name: Commit generated package
        if: steps.freshness.outputs.persist == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          package_path="${PACKAGE_DIR}/${PACKAGE_FILENAME}"
          checksum_path="${package_path}.sha256"
          remote_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "$package_path" "$checksum_path"

          if git diff --cached --quiet; then
            echo "Generated MKP is already current in ${PACKAGE_DIR}; nothing to commit."
            exit 0
          fi

          git commit -m "build(${PACKAGE_NAME}): update MKP ${PACKAGE_VERSION} [skip ci]"
          git fetch "$remote_url" master

          if ! git diff --quiet "${SOURCE_SHA}..FETCH_HEAD" -- \
            "$PACKAGE_DIR" \
            .github/workflows/oxidized_backup-ci.yml; then
            echo "Package inputs changed on master while the MKP was being persisted; refusing to push a stale package."
            exit 0
          fi

          git rebase FETCH_HEAD
          git push "$remote_url" HEAD:master
