name: oxidized_backup Bakery diagnostic

on:
  pull_request:
    paths:
      - "oxidized_backup/**"
      - ".github/workflows/oxidized_backup-bakery-debug.yml"

permissions:
  contents: read

jobs:
  bakery-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Start Checkmk container
        run: |
          set -euo pipefail
          docker run --detach --name checkmk-bakery-debug \
            --env CMK_PASSWORD='diagnostic-password' \
            --env CMK_SITE_ID='cmk' \
            --volume "$GITHUB_WORKSPACE:/work:ro" \
            checkmk/check-mk-raw:2.4.0p34
          for _ in $(seq 1 120); do
            if docker logs checkmk-bakery-debug 2>&1 | grep -q '### CONTAINER STARTED'; then
              exit 0
            fi
            sleep 2
          done
          docker logs checkmk-bakery-debug
          exit 1

      - name: Capture Bakery validation
        run: |
          set +e
          docker exec --user root checkmk-bakery-debug bash -lc '
            install -d -o cmk -g cmk /omd/sites/cmk/local/lib/python3/cmk_addons/plugins/oxidized_backup
            cp -a /work/oxidized_backup/src/oxidized_backup/. \
              /omd/sites/cmk/local/lib/python3/cmk_addons/plugins/oxidized_backup/
            install -D -m 0755 -o cmk -g cmk \
              /work/oxidized_backup/src/agents/plugins/oxidized_backup \
              /omd/sites/cmk/local/share/check_mk/agents/plugins/oxidized_backup
            install -D -m 0644 -o cmk -g cmk \
              /work/oxidized_backup/src/lib/base/cee/plugins/bakery/oxidized_backup.py \
              /omd/sites/cmk/local/lib/check_mk/base/cee/plugins/bakery/oxidized_backup.py
          '
          docker exec --user cmk checkmk-bakery-debug bash -lc '
            python3 - <<"PY"
          import importlib.util
          import pathlib
          import sys
          import traceback

          path = pathlib.Path(
              "/omd/sites/cmk/local/lib/check_mk/base/cee/plugins/bakery/oxidized_backup.py"
          )
          name = "cmk.base.cee.plugins.bakery.oxidized_backup"
          try:
              spec = importlib.util.spec_from_file_location(name, path)
              assert spec is not None and spec.loader is not None
              module = importlib.util.module_from_spec(spec)
              sys.modules[name] = module
              spec.loader.exec_module(module)
              conf = {
                  "deployment": ("cached", 300.0),
                  "inventory": {
                      "url": "https://checkmk.example.invalid/site/open/oxidized.json",
                      "timeout_seconds": 10,
                      "max_response_bytes": 4194304,
                      "allow_insecure_http": False,
                      "auth": ("none", None),
                  },
                  "oxidized": {
                      "url": "http://127.0.0.1:8888/nodes.json",
                      "timeout_seconds": 10,
                      "max_response_bytes": 4194304,
                      "allow_insecure_http": False,
                      "auth": ("none", None),
                  },
                  "state": {
                      "hook_state_file": "/var/lib/oxidized/oxidized_backup/hook-state.json",
                      "monitor_state_file": "/var/lib/check_mk_agent/oxidized_backup/monitor-state.json",
                  },
                  "git": {
                      "run_as_user": "oxidized",
                      "git_binary": "/usr/bin/git",
                      "repositories": [{
                          "id": "default",
                          "path": "/var/lib/oxidized/oxidized.git",
                          "groups": [("wildcard", None)],
                          "single_repo": True,
                          "remote": "origin",
                          "branch": "main",
                          "command_timeout_seconds": 30,
                          "fsck_timeout_seconds": 120,
                      }],
                  },
                  "policy": {
                      "collection_warning_age_seconds": 7200.0,
                      "collection_critical_age_seconds": 14400.0,
                      "remote_sync_grace_seconds": 300.0,
                      "remote_verification_max_age_seconds": 3600.0,
                      "fsck_interval_seconds": 3600.0,
                      "orphan_state": "warn",
                  },
              }
              print(module)
              print(list(module.get_files(conf)))
              print(list(module.get_scriptlets(conf, "diagnostic")))
          except Exception:
              traceback.print_exc()
              raise
          PY
          ' >"$RUNNER_TEMP/bakery-diagnostic.log" 2>&1
          echo "status=$?" >>"$GITHUB_OUTPUT"
          cat "$RUNNER_TEMP/bakery-diagnostic.log"
          exit 0
        id: diagnostic

      - name: Upload diagnostic
        uses: actions/upload-artifact@v6
        with:
          name: oxidized-backup-bakery-diagnostic
          path: ${{ runner.temp }}/bakery-diagnostic.log
          if-no-files-found: error
          retention-days: 1

      - name: Remove container
        if: always()
        run: docker rm --force checkmk-bakery-debug || true
