name: Temporary MKP manifest debug

on:
  pull_request:
    paths:
      - ".github/workflows/tmp-mkp-debug.yml"
      - ".github/workflows/generated-mkp-ci.yml"

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PACKAGE_DIR: acgateway
      PACKAGE_NAME: acgateway
      PACKAGE_SOURCE: acgateway/src/acgateway
      PACKAGE_VERSION: 2.0.6
      PACKAGE_TITLE: AudioCode Gateway
      PACKAGE_AUTHOR: Kuhn & Rueß GmbH
      PACKAGE_DESCRIPTION: SNMP checks for AudioCodes SIP gateways
      PACKAGE_MIN_REQUIRED: 2.4.0p5
      PACKAGED_VERSION: 2.5.0p9
      USABLE_UNTIL: 2.5.99
      PLUGIN_BASE: /omd/sites/cmk/local/lib/python3/cmk_addons/plugins
      EXECUTABLE_RELPATH: ""
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run manifest setup with captured output
        run: |
          set -euo pipefail
          : > mkp-debug.log
          docker run --detach \
            --name checkmk-debug \
            --env CMK_PASSWORD='generated-mkp-ci-password' \
            --env CMK_SITE_ID='cmk' \
            --env GITHUB_REPOSITORY \
            --env PACKAGE_DIR \
            --env PACKAGE_NAME \
            --env PACKAGE_SOURCE \
            --env PACKAGE_VERSION \
            --env PACKAGE_TITLE \
            --env PACKAGE_AUTHOR \
            --env PACKAGE_DESCRIPTION \
            --env PACKAGE_MIN_REQUIRED \
            --env PACKAGED_VERSION \
            --env USABLE_UNTIL \
            --env PLUGIN_BASE \
            --env EXECUTABLE_RELPATH \
            --volume "$GITHUB_WORKSPACE:/work:ro" \
            checkmk/check-mk-community:2.5.0p9 >>mkp-debug.log 2>&1

          for _ in $(seq 1 120); do
            if docker logs checkmk-debug 2>&1 | grep -q '### CONTAINER STARTED'; then
              break
            fi
            sleep 2
          done

          set +e
          docker exec --user root checkmk-debug bash -lc '
            set -euxo pipefail
            source_path="/work/${PACKAGE_SOURCE}"
            target="${PLUGIN_BASE}/${PACKAGE_NAME}"
            test -d "$source_path"
            install -d -o cmk -g cmk "$target"
            cp -a "$source_path/." "$target/"
            find "$target" -type d -name __pycache__ -prune -exec rm -rf {} +
            find "$target" -type f -name "*.pyc" -delete
            chown -R cmk:cmk "$target"
          ' >>mkp-debug.log 2>&1
          echo "root_rc=$?" >>mkp-debug.log

          docker exec --user cmk checkmk-debug bash -lc '
            set -euxo pipefail
            env | sort
            manifest="$HOME/tmp/check_mk/${PACKAGE_NAME}-ci.manifest.temp"
            mkdir -p "$(dirname "$manifest")"
            MANIFEST="$manifest" python3 - <<"PY"
          import ast
          import os
          from pathlib import Path

          print("python env", {key: os.environ.get(key) for key in (
              "MANIFEST", "PLUGIN_BASE", "PACKAGE_NAME", "PACKAGE_DIR", "PACKAGE_VERSION"
          )})
          plugin_base = Path(os.environ["PLUGIN_BASE"])
          package_name = os.environ["PACKAGE_NAME"]
          package_dir = os.environ["PACKAGE_DIR"]
          source_info = Path("/work") / package_dir / "src" / "info"
          print("source_info", source_info, source_info.exists())
          print("plugin_root", plugin_base / package_name, (plugin_base / package_name).exists())
          manifest = ast.literal_eval(source_info.read_text(encoding="utf-8"))
          files = sorted(
              str(path.relative_to(plugin_base))
              for path in (plugin_base / package_name).rglob("*")
              if path.is_file() and "__pycache__" not in path.parts and path.suffix != ".pyc"
          )
          print("files", files)
          manifest.update({
              "name": package_name,
              "version": os.environ["PACKAGE_VERSION"],
              "version.packaged": os.environ["PACKAGED_VERSION"],
              "version.usable_until": os.environ["USABLE_UNTIL"],
              "files": {"cmk_addons_plugins": files},
          })
          Path(os.environ["MANIFEST"]).write_text(repr(manifest) + "\n", encoding="utf-8")
          print("manifest written")
          PY
          ' >>mkp-debug.log 2>&1
          echo "manifest_rc=$?" >>mkp-debug.log
          set -e
          docker logs checkmk-debug >>mkp-debug.log 2>&1 || true
          docker rm --force checkmk-debug >>mkp-debug.log 2>&1 || true
          cat mkp-debug.log

      - name: Upload debug log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mkp-manifest-debug
          path: mkp-debug.log
          if-no-files-found: error
          retention-days: 1
