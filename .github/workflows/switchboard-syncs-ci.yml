name: Switchboard syncs checks

on:
  pull_request:
    paths:
      - "switchboard-syncs/**"
      - ".github/workflows/switchboard-syncs-ci.yml"
  push:
    branches:
      - master
    paths:
      - "switchboard-syncs/**"
      - ".github/workflows/switchboard-syncs-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: switchboard-syncs-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python syntax and functional tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test tools
        run: python -m pip install --disable-pip-version-check pytest==8.4.1 ruff==0.12.4

      - name: Check for fatal Python errors
        run: >-
          ruff check
          --select E9,F63,F7,F82
          switchboard-syncs/src/switch_port_sync
          switchboard-syncs/tests

      - name: Compile all Python files
        run: python -m compileall -q switchboard-syncs/src/switch_port_sync switchboard-syncs/tests

      - name: Run discovery and state-matrix tests
        run: pytest -q switchboard-syncs/tests

      - name: Validate check manual metadata
        run: |
          python - <<'PY'
          from pathlib import Path

          required = {"title", "agents", "catalog", "license", "distribution", "description", "inventory"}
          checkman_dir = Path("switchboard-syncs/src/switch_port_sync/checkman")
          errors = []

          for path in sorted(checkman_dir.iterdir()):
              if not path.is_file():
                  continue
              keys = {
                  line.split(":", 1)[0].strip()
                  for line in path.read_text(encoding="utf-8").splitlines()
                  if line and not line[0].isspace() and ":" in line
              }
              missing = sorted(required - keys)
              if missing:
                  errors.append(f"{path}: missing {', '.join(missing)}")

          if errors:
              raise SystemExit("\n".join(errors))
          PY

  checkmk-api-load:
    name: Checkmk API load (${{ matrix.checkmk }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        checkmk:
          - 2.4.0p5
          - 2.4.0p34

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Start Checkmk Raw container
        env:
          CHECKMK_IMAGE: checkmk/check-mk-raw:${{ matrix.checkmk }}
        run: |
          set -euo pipefail
          docker run --detach \
            --name checkmk-ci \
            --env CMK_PASSWORD='switchboard-syncs-ci-password' \
            --env CMK_SITE_ID='cmk' \
            --volume "$GITHUB_WORKSPACE:/work:ro" \
            "$CHECKMK_IMAGE"

          for _ in $(seq 1 120); do
            if docker logs checkmk-ci 2>&1 | grep -q '### CONTAINER STARTED'; then
              exit 0
            fi
            if ! docker inspect --format '{{.State.Running}}' checkmk-ci | grep -q true; then
              docker logs checkmk-ci
              exit 1
            fi
            sleep 2
          done

          docker logs checkmk-ci
          echo 'Checkmk container did not become ready' >&2
          exit 1

      - name: Install plug-ins into the temporary site
        run: |
          docker exec --user root checkmk-ci bash -lc '
            set -euo pipefail
            target=/omd/sites/cmk/local/lib/python3/cmk_addons/plugins/switch_port_sync
            install -d -o cmk -g cmk "$target"
            cp -a /work/switchboard-syncs/src/switch_port_sync/. "$target/"
            chmod 0755 "$target/libexec/agent_switch_port_sync"
            chown -R cmk:cmk "$target"
          '

      - name: Load and validate plug-ins with Checkmk
        run: |
          docker exec --user cmk checkmk-ci bash -lc '
            set -euo pipefail
            export PAGER=cat
            plugin_root="$HOME/local/lib/python3/cmk_addons/plugins/switch_port_sync"

            python3 -m compileall -q "$plugin_root"
            "$plugin_root/libexec/agent_switch_port_sync" --help >/dev/null

            while IFS= read -r -d "" plugin; do
              echo "Loading ${plugin#$plugin_root/}"
              python3 "$plugin"
            done < <(find \
              "$plugin_root/agent_based" \
              "$plugin_root/rulesets" \
              "$plugin_root/server_side_calls" \
              -type f -name "*.py" -print0 | sort -z)

            cmk-validate-plugins
            cmk -M switch_port_sync >/dev/null
            cmk -R
          '

      - name: Show Checkmk logs on failure
        if: failure()
        run: docker logs checkmk-ci || true

      - name: Remove temporary Checkmk container
        if: always()
        run: docker rm --force checkmk-ci || true

  mkp-package:
    name: Build and inspect MKP
    needs:
      - python-tests
      - checkmk-api-load
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Prepare artifact directory
        run: install -d -m 0777 "$GITHUB_WORKSPACE/artifacts"

      - name: Start Checkmk Raw packaging container
        run: |
          set -euo pipefail
          docker run --detach \
            --name checkmk-mkp \
            --env CMK_PASSWORD='switchboard-syncs-ci-password' \
            --env CMK_SITE_ID='cmk' \
            --env CI_PACKAGE_VERSION='1.0.0' \
            --env CI_SHORT_SHA="${GITHUB_SHA::12}" \
            --env CI_RUN_NUMBER="${GITHUB_RUN_NUMBER}" \
            --volume "$GITHUB_WORKSPACE:/work:ro" \
            --volume "$GITHUB_WORKSPACE/artifacts:/artifacts" \
            checkmk/check-mk-raw:2.4.0p34

          for _ in $(seq 1 120); do
            if docker logs checkmk-mkp 2>&1 | grep -q '### CONTAINER STARTED'; then
              exit 0
            fi
            if ! docker inspect --format '{{.State.Running}}' checkmk-mkp | grep -q true; then
              docker logs checkmk-mkp
              exit 1
            fi
            sleep 2
          done

          docker logs checkmk-mkp
          echo 'Checkmk packaging container did not become ready' >&2
          exit 1

      - name: Install package source into Checkmk
        run: |
          docker exec --user root checkmk-mkp bash -lc '
            set -euo pipefail
            target=/omd/sites/cmk/local/lib/python3/cmk_addons/plugins/switch_port_sync
            install -d -o cmk -g cmk "$target"
            cp -a /work/switchboard-syncs/src/switch_port_sync/. "$target/"
            chmod 0755 "$target/libexec/agent_switch_port_sync"
            find "$target" -type d -name __pycache__ -prune -exec rm -rf {} +
            find "$target" -type f -name "*.pyc" -delete
            chown -R cmk:cmk "$target"
          '

      - name: Generate and validate MKP manifest
        run: |
          docker exec --user cmk checkmk-mkp bash -lc '
            set -euo pipefail
            plugin_base="$HOME/local/lib/python3/cmk_addons/plugins"
            manifest="$HOME/tmp/check_mk/switch-port-sync-ci.manifest.temp"
            mkdir -p "$(dirname "$manifest")"

            MANIFEST="$manifest" PLUGIN_BASE="$plugin_base" python3 - <<"PY"
          import ast
          import os
          from pathlib import Path

          plugin_base = Path(os.environ["PLUGIN_BASE"])
          plugin_root = plugin_base / "switch_port_sync"
          files = sorted(
              str(path.relative_to(plugin_base))
              for path in plugin_root.rglob("*")
              if path.is_file() and "__pycache__" not in path.parts and path.suffix != ".pyc"
          )

          manifest = {
              "name": "switch_port_sync",
              "title": "Switch Port Synchronization",
              "author": "Daniel Dietz",
              "description": (
                  "Compares one-to-one Checkmk interface services on a switch pair "
                  "through Livestatus and reports asymmetric or failed links."
              ),
              "version": os.environ["CI_PACKAGE_VERSION"],
              "version.min_required": "2.4.0b1",
              "version.packaged": "2.4.0p34",
              "version.usable_until": "2.4.99",
              "download_url": (
                  "https://github.com/DanielDietz-de/Checkmk-Checks/"
                  "tree/master/switchboard-syncs"
              ),
              "files": {"cmk_addons_plugins": files},
          }

          content = repr(manifest) + "\n"
          path = Path(os.environ["MANIFEST"])
          path.write_text(content, encoding="utf-8")
          parsed = ast.literal_eval(path.read_text(encoding="utf-8"))
          assert parsed == manifest
          assert files
          print(f"Manifest contains {len(files)} files")
          print(content)
          PY
          '

      - name: Build MKP with Checkmk
        run: |
          docker exec --user cmk checkmk-mkp bash -lc '
            set -euxo pipefail
            mkp --debug package "$HOME/tmp/check_mk/switch-port-sync-ci.manifest.temp"
            find "$HOME/var/check_mk/packages_local" -maxdepth 1 -type f -name "*.mkp" -ls
          '

      - name: Inspect MKP with Checkmk
        run: |
          docker exec --user cmk checkmk-mkp bash -lc '
            set -euo pipefail
            export PAGER=cat
            package=$(find "$HOME/var/check_mk/packages_local" -maxdepth 1 -type f -name "switch_port_sync-${CI_PACKAGE_VERSION}.mkp" -print -quit)
            test -n "$package"
            mkp inspect "$package"
          '

      - name: Verify MKP archive contents and checksum
        run: |
          docker exec --user cmk checkmk-mkp bash -lc '
            set -euo pipefail
            package=$(find "$HOME/var/check_mk/packages_local" -maxdepth 1 -type f -name "switch_port_sync-${CI_PACKAGE_VERSION}.mkp" -print -quit)
            test -n "$package"

            PACKAGE="$package" python3 - <<"PY"
          import os
          import tarfile
          from pathlib import PurePosixPath

          package = os.environ["PACKAGE"]
          required_outer = {"info", "info.json", "cmk_addons_plugins.tar"}
          required_inner = {
              "switch_port_sync/agent_based/switch_port_sync.py",
              "switch_port_sync/checkman/switch_port_sync",
              "switch_port_sync/libexec/agent_switch_port_sync",
              "switch_port_sync/rulesets/special_agent.py",
              "switch_port_sync/server_side_calls/special_agent.py",
          }

          def normalized(name: str) -> str:
              return str(PurePosixPath(name.removeprefix("./")))

          with tarfile.open(package, "r:*") as outer:
              outer_members = outer.getmembers()
              outer_names = {PurePosixPath(normalized(member.name)).name for member in outer_members}
              missing_outer = required_outer - outer_names
              if missing_outer:
                  raise SystemExit(f"Missing outer MKP members: {sorted(missing_outer)}")

              component_member = next(
                  member
                  for member in outer_members
                  if PurePosixPath(normalized(member.name)).name == "cmk_addons_plugins.tar"
              )
              component_file = outer.extractfile(component_member)
              if component_file is None:
                  raise SystemExit("Unable to read cmk_addons_plugins.tar")

              with tarfile.open(fileobj=component_file, mode="r:*") as inner:
                  inner_names = {normalized(member.name) for member in inner.getmembers()}

          for required in required_inner:
              if not any(name == required or name.endswith("/" + required) for name in inner_names):
                  raise SystemExit(f"Missing packaged plug-in: {required}")

          print(f"Verified {len(required_inner)} required plug-in files")
          PY

            output="/artifacts/switch_port_sync-${CI_PACKAGE_VERSION}-run${CI_RUN_NUMBER}-${CI_SHORT_SHA}.mkp"
            cp "$package" "$output"
            artifact_name=$(basename "$output")
            (
              cd /artifacts
              sha256sum "$artifact_name" >"${artifact_name}.sha256"
            )
            chmod 0644 "$output" "${output}.sha256"
          '

      - name: Upload MKP artifact
        uses: actions/upload-artifact@v6
        with:
          name: switch-port-sync-mkp-${{ github.run_number }}
          path: |
            artifacts/*.mkp
            artifacts/*.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Show Checkmk logs on failure
        if: failure()
        run: docker logs checkmk-mkp || true

      - name: Remove packaging container
        if: always()
        run: docker rm --force checkmk-mkp || true
