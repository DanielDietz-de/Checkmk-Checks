name: oxidized_backup load diagnostic

on:
  pull_request:
    paths:
      - "oxidized_backup/**"
      - ".github/workflows/oxidized_backup-load-debug.yml"

permissions:
  contents: read

jobs:
  load-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Start Checkmk
        run: |
          docker run --detach --name checkmk-load-debug \
            --env CMK_PASSWORD=diagnostic-password \
            --env CMK_SITE_ID=cmk \
            --volume "$GITHUB_WORKSPACE:/work:ro" \
            checkmk/check-mk-raw:2.4.0p34
          for _ in $(seq 1 120); do
            if docker logs checkmk-load-debug 2>&1 | grep -q '### CONTAINER STARTED'; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install files
        run: |
          docker exec --user root checkmk-load-debug bash -lc '
            install -d -o cmk -g cmk \
              /omd/sites/cmk/local/lib/python3/cmk_addons/plugins/oxidized_backup
            cp -a /work/oxidized_backup/src/oxidized_backup/. \
              /omd/sites/cmk/local/lib/python3/cmk_addons/plugins/oxidized_backup/
            install -D -m 0755 -o cmk -g cmk \
              /work/oxidized_backup/src/agents/plugins/oxidized_backup \
              /omd/sites/cmk/local/share/check_mk/agents/plugins/oxidized_backup
            install -D -m 0644 -o cmk -g cmk \
              /work/oxidized_backup/src/lib/base/cee/plugins/bakery/oxidized_backup.py \
              /omd/sites/cmk/local/lib/check_mk/base/cee/plugins/bakery/oxidized_backup.py
          '

      - name: Capture load validation
        run: |
          set +e
          docker exec --user cmk checkmk-load-debug bash -lc '
            set -euxo pipefail
            plugin_root=/omd/sites/cmk/local/lib/python3/cmk_addons/plugins/oxidized_backup
            python3 -m compileall -q "$plugin_root"
            python3 -m py_compile \
              /omd/sites/cmk/local/share/check_mk/agents/plugins/oxidized_backup \
              /omd/sites/cmk/local/lib/check_mk/base/cee/plugins/bakery/oxidized_backup.py
            /omd/sites/cmk/local/share/check_mk/agents/plugins/oxidized_backup --help >/dev/null
            while IFS= read -r -d "" plugin; do
              echo "Loading ${plugin#$plugin_root/}"
              python3 "$plugin"
            done < <(
              find "$plugin_root/agent_based" "$plugin_root/rulesets" \
                -type f -name "*.py" -print0 | sort -z
            )
          ' >"$RUNNER_TEMP/load-diagnostic.log" 2>&1
          echo "exit_status=$?" >>"$RUNNER_TEMP/load-diagnostic.log"
          cat "$RUNNER_TEMP/load-diagnostic.log"
          exit 0

      - name: Upload diagnostic
        uses: actions/upload-artifact@v6
        with:
          name: oxidized-backup-load-diagnostic
          path: ${{ runner.temp }}/load-diagnostic.log
          retention-days: 1
          if-no-files-found: error

      - name: Remove container
        if: always()
        run: docker rm --force checkmk-load-debug || true
