name: AudioCodes gateway checks

on:
  pull_request:
    paths:
      - "acgateway/**"
      - ".github/workflows/acgateway-ci.yml"
      - ".github/workflows/generated-mkp-ci.yml"
  push:
    branches:
      - master
    paths:
      - "acgateway/**"
      - ".github/workflows/acgateway-ci.yml"
      - ".github/workflows/generated-mkp-ci.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: acgateway-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-package:
    uses: ./.github/workflows/generated-mkp-ci.yml
    with:
      package_dir: acgateway
      package_name: acgateway
      package_source: acgateway/src/acgateway
      package_title: AudioCode Gateway
      package_author: Kuhn & Rueß GmbH
      package_description: SNMP checks for AudioCodes SIP gateways
      min_required: 2.4.0b1
      test_dir: acgateway/tests
      manual_checks: >-
        acgateway_call_capacity
        acgateway_ha
        acgateway_license
        acgateway_tls
