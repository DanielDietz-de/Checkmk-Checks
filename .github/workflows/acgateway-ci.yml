name: AudioCodes gateway checks

on:
  pull_request:
    paths:
      - "acgateway/**"
      - ".github/workflows/acgateway-ci.yml"
  push:
    branches:
      - master
    paths:
      - "acgateway/**"
      - ".github/workflows/acgateway-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: acgateway-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python syntax and parser tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test tools
        run: python -m pip install --disable-pip-version-check pytest==8.4.1 ruff==0.12.4

      - name: Check for fatal Python errors
        run: >-
          ruff check
          --select E9,F63,F7,F82
          acgateway/src/acgateway
          acgateway/tests

      - name: Compile all Python files
        run: python -m compileall -q acgateway/src/acgateway acgateway/tests

      - name: Run parser and alarm-correlation tests
        run: pytest -q acgateway/tests

      - name: Validate check manual metadata
        run: |
          python - <<'PY'
          from pathlib import Path

          required = {"title", "agents", "catalog", "license", "distribution", "description", "inventory"}
          checkman_dir = Path("acgateway/src/acgateway/checkman")
          errors = []

          for path in sorted(checkman_dir.iterdir()):
              if not path.is_file():
                  continue
              keys = {
                  line.split(":", 1)[0].strip()
                  for line in path.read_text(encoding="utf-8").splitlines()
                  if line and not line[0].isspace() and ":" in line
              }
              missing = sorted(required - keys)
              if missing:
                  errors.append(f"{path}: missing {', '.join(missing)}")

          if errors:
              raise SystemExit("\n".join(errors))
          PY

  checkmk-api-load:
    name: Checkmk API load (${{ matrix.checkmk }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        checkmk:
          - 2.4.0p5
          - 2.4.0p34

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Start Checkmk Raw container
        env:
          CHECKMK_IMAGE: checkmk/check-mk-raw:${{ matrix.checkmk }}
        run: |
          set -euo pipefail
          docker run --detach \
            --name checkmk-ci \
            --env CMK_PASSWORD='acgateway-ci-password' \
            --env CMK_SITE_ID='cmk' \
            --volume "$GITHUB_WORKSPACE:/work:ro" \
            "$CHECKMK_IMAGE"

          for _ in $(seq 1 120); do
            if docker logs checkmk-ci 2>&1 | grep -q '### CONTAINER STARTED'; then
              exit 0
            fi
            if ! docker inspect --format '{{.State.Running}}' checkmk-ci | grep -q true; then
              docker logs checkmk-ci
              exit 1
            fi
            sleep 2
          done

          docker logs checkmk-ci
          echo 'Checkmk container did not become ready' >&2
          exit 1

      - name: Install plug-ins into the temporary site
        run: |
          docker exec --user root checkmk-ci bash -lc '
            set -euo pipefail
            target=/omd/sites/cmk/local/lib/python3/cmk_addons/plugins/acgateway
            install -d -o cmk -g cmk "$target"
            cp -a /work/acgateway/src/acgateway/. "$target/"
            chown -R cmk:cmk "$target"
          '

      - name: Load and validate plug-ins with Checkmk
        run: |
          docker exec --user cmk checkmk-ci bash -lc '
            set -euo pipefail
            export PAGER=cat
            plugin_root="$HOME/local/lib/python3/cmk_addons/plugins/acgateway"

            python3 -m compileall -q "$plugin_root"

            while IFS= read -r -d "" plugin; do
              echo "Loading ${plugin#$plugin_root/}"
              python3 "$plugin"
            done < <(find "$plugin_root/agent_based" "$plugin_root/graphing" -type f -name "*.py" -print0 | sort -z)

            cmk-validate-plugins

            for check in \
              acgateway_call_capacity \
              acgateway_ha \
              acgateway_license \
              acgateway_tls; do
              cmk -M "$check" >/dev/null
            done

            cmk -R
          '

      - name: Show Checkmk logs on failure
        if: failure()
        run: docker logs checkmk-ci || true

      - name: Remove temporary Checkmk container
        if: always()
        run: docker rm --force checkmk-ci || true
