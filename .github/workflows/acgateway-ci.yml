name: AudioCodes gateway checks

on:
  pull_request:
    paths:
      - "acgateway/**"
      - ".github/workflows/acgateway-ci.yml"
  push:
    branches:
      - master
    paths:
      - "acgateway/**"
      - ".github/workflows/acgateway-ci.yml"
  workflow_dispatch:

env:
  PACKAGE_DIR: acgateway
  PACKAGE_NAME: acgateway
  PACKAGE_SOURCE: acgateway/src/acgateway
  PACKAGE_VERSION: "2.0.4"
  PLUGIN_BASE: /omd/sites/cmk/local/lib/python3/cmk_addons/plugins

permissions:
  contents: read

concurrency:
  group: acgateway-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python syntax and parser tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test tools
        run: python -m pip install --disable-pip-version-check pytest==8.4.1 ruff==0.12.4

      - name: Check for fatal Python errors
        run: >-
          ruff check
          --select E9,F63,F7,F82
          "$PACKAGE_SOURCE"
          "$PACKAGE_DIR/tests"

      - name: Compile all Python files
        run: python -m compileall -q "$PACKAGE_SOURCE" "$PACKAGE_DIR/tests"

      - name: Run parser and alarm-correlation tests
        run: pytest -q "$PACKAGE_DIR/tests"

      - name: Validate check manual metadata
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          required = {"title", "agents", "catalog", "license", "distribution", "description", "inventory"}
          checkman_dir = Path(os.environ["PACKAGE_SOURCE"]) / "checkman"
          errors = []

          for path in sorted(checkman_dir.iterdir()):
              if not path.is_file():
                  continue
              keys = {
                  line.split(":", 1)[0].strip()
                  for line in path.read_text(encoding="utf-8").splitlines()
                  if line and not line[0].isspace() and ":" in line
              }
              missing = sorted(required - keys)
              if missing:
                  errors.append(f"{path}: missing {', '.join(missing)}")

          if errors:
              raise SystemExit("\n".join(errors))
          PY

  checkmk-api-load:
    name: Checkmk API load (${{ matrix.checkmk }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        checkmk:
          - 2.4.0p5
          - 2.4.0p34

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Start Checkmk Raw container
        env:
          CHECKMK_IMAGE: checkmk/check-mk-raw:${{ matrix.checkmk }}
        run: |
          set -euo pipefail
          docker run --detach \
            --name checkmk-ci \
            --env CMK_PASSWORD='acgateway-ci-password' \
            --env CMK_SITE_ID='cmk' \
            --env PACKAGE_NAME \
            --env PACKAGE_SOURCE \
            --env PLUGIN_BASE \
            --volume "$GITHUB_WORKSPACE:/work:ro" \
            "$CHECKMK_IMAGE"

          for _ in $(seq 1 120); do
            if docker logs checkmk-ci 2>&1 | grep -q '### CONTAINER STARTED'; then
              exit 0
            fi
            if ! docker inspect --format '{{.State.Running}}' checkmk-ci | grep -q true; then
              docker logs checkmk-ci
              exit 1
            fi
            sleep 2
          done

          docker logs checkmk-ci
          echo 'Checkmk container did not become ready' >&2
          exit 1

      - name: Install plug-ins into the temporary site
        run: |
          docker exec --user root checkmk-ci bash -lc '
            set -euo pipefail
            source="/work/${PACKAGE_SOURCE}"
            target="${PLUGIN_BASE}/${PACKAGE_NAME}"
            test -d "$source"
            install -d -o cmk -g cmk "$target"
            cp -a "$source/." "$target/"
            chown -R cmk:cmk "$target"
          '

      - name: Load and validate plug-ins with Checkmk
        run: |
          docker exec --user cmk checkmk-ci bash -lc '
            set -euo pipefail
            export PAGER=cat
            plugin_root="${PLUGIN_BASE}/${PACKAGE_NAME}"

            python3 -m compileall -q "$plugin_root"

            while IFS= read -r -d "" plugin; do
              echo "Loading ${plugin#$plugin_root/}"
              python3 "$plugin"
            done < <(find "$plugin_root/agent_based" "$plugin_root/graphing" -type f -name "*.py" -print0 | sort -z)

            cmk-validate-plugins

            for check in \
              acgateway_call_capacity \
              acgateway_ha \
              acgateway_license \
              acgateway_tls; do
              cmk -M "$check" >/dev/null
            done

            cmk -R
          '

      - name: Show Checkmk logs on failure
        if: failure()
        run: docker logs checkmk-ci || true

      - name: Remove temporary Checkmk container
        if: always()
        run: docker rm --force checkmk-ci || true

  mkp-package:
    name: Build and inspect MKP
    needs:
      - python-tests
      - checkmk-api-load
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Start Checkmk Raw packaging container
        run: |
          set -euo pipefail
          docker run --detach \
            --name checkmk-mkp \
            --env CMK_PASSWORD='acgateway-ci-password' \
            --env CMK_SITE_ID='cmk' \
            --env GITHUB_REPOSITORY \
            --env PACKAGE_DIR \
            --env PACKAGE_NAME \
            --env PACKAGE_SOURCE \
            --env PACKAGE_VERSION \
            --env PLUGIN_BASE \
            --volume "$GITHUB_WORKSPACE:/work:ro" \
            checkmk/check-mk-raw:2.4.0p34

          for _ in $(seq 1 120); do
            if docker logs checkmk-mkp 2>&1 | grep -q '### CONTAINER STARTED'; then
              exit 0
            fi
            if ! docker inspect --format '{{.State.Running}}' checkmk-mkp | grep -q true; then
              docker logs checkmk-mkp
              exit 1
            fi
            sleep 2
          done

          docker logs checkmk-mkp
          echo 'Checkmk packaging container did not become ready' >&2
          exit 1

      - name: Install package source into Checkmk
        run: |
          docker exec --user root checkmk-mkp bash -lc '
            set -euo pipefail
            source="/work/${PACKAGE_SOURCE}"
            target="${PLUGIN_BASE}/${PACKAGE_NAME}"
            test -d "$source"
            install -d -o cmk -g cmk "$target"
            cp -a "$source/." "$target/"
            find "$target" -type d -name __pycache__ -prune -exec rm -rf {} +
            find "$target" -type f -name "*.pyc" -delete
            chown -R cmk:cmk "$target"
          '

      - name: Generate and validate MKP manifest
        run: |
          docker exec --user cmk checkmk-mkp bash -lc '
            set -euo pipefail
            manifest="$HOME/tmp/check_mk/${PACKAGE_NAME}-ci.manifest.temp"
            mkdir -p "$(dirname "$manifest")"

            MANIFEST="$manifest" python3 - <<"PY"
          import ast
          import os
          from pathlib import Path

          plugin_base = Path(os.environ["PLUGIN_BASE"])
          package_name = os.environ["PACKAGE_NAME"]
          package_dir = os.environ["PACKAGE_DIR"]
          repository = os.environ["GITHUB_REPOSITORY"]
          plugin_root = plugin_base / package_name
          files = sorted(
              str(path.relative_to(plugin_base))
              for path in plugin_root.rglob("*")
              if path.is_file() and "__pycache__" not in path.parts and path.suffix != ".pyc"
          )

          manifest = {
              "name": package_name,
              "title": "AudioCode Gateway",
              "author": "Kuhn & Ruess GmbH",
              "description": (
                  "SNMP monitoring for AudioCodes gateways and SBCs, including calls, "
                  "license capacity, HA health, TLS connections, alarms and SIP statistics."
              ),
              "version": os.environ["PACKAGE_VERSION"],
              "version.min_required": "2.4.0b1",
              "version.packaged": "2.4.0p34",
              "version.usable_until": "2.4.99",
              "download_url": f"https://github.com/{repository}/tree/master/{package_dir}",
              "files": {"cmk_addons_plugins": files},
          }

          content = repr(manifest) + "\n"
          path = Path(os.environ["MANIFEST"])
          path.write_text(content, encoding="utf-8")
          parsed = ast.literal_eval(path.read_text(encoding="utf-8"))
          assert parsed == manifest
          assert files
          print(f"Manifest contains {len(files)} files")
          print(content)
          PY
          '

      - name: Build MKP with Checkmk
        run: |
          docker exec --user cmk checkmk-mkp bash -lc '
            set -euxo pipefail
            manifest="$HOME/tmp/check_mk/${PACKAGE_NAME}-ci.manifest.temp"
            mkp --debug package "$manifest"
            find "$HOME/var/check_mk/packages_local" -maxdepth 1 -type f -name "${PACKAGE_NAME}-${PACKAGE_VERSION}.mkp" -ls
          '

      - name: Inspect and verify MKP with Checkmk
        run: |
          docker exec --user cmk checkmk-mkp bash -lc '
            set -euo pipefail
            export PAGER=cat
            package="$HOME/var/check_mk/packages_local/${PACKAGE_NAME}-${PACKAGE_VERSION}.mkp"
            test -f "$package"
            mkp inspect "$package"

            PACKAGE="$package" python3 - <<"PY"
          import ast
          import os
          import tarfile
          from pathlib import PurePosixPath

          package = os.environ["PACKAGE"]

          def normalized(name: str) -> str:
              return str(PurePosixPath(name.removeprefix("./")))

          with tarfile.open(package, "r:*") as outer:
              outer_members = outer.getmembers()
              by_basename = {
                  PurePosixPath(normalized(member.name)).name: member
                  for member in outer_members
              }
              required_outer = {"info", "info.json", "cmk_addons_plugins.tar"}
              missing_outer = required_outer - set(by_basename)
              if missing_outer:
                  raise SystemExit(f"Missing outer MKP members: {sorted(missing_outer)}")

              info_file = outer.extractfile(by_basename["info"])
              component_file = outer.extractfile(by_basename["cmk_addons_plugins.tar"])
              if info_file is None or component_file is None:
                  raise SystemExit("Unable to read MKP metadata or component archive")

              info = ast.literal_eval(info_file.read().decode("utf-8"))
              required_inner = set(info.get("files", {}).get("cmk_addons_plugins", []))
              if not required_inner:
                  raise SystemExit("Manifest contains no cmk_addons_plugins files")

              with tarfile.open(fileobj=component_file, mode="r:*") as inner:
                  inner_names = {normalized(member.name) for member in inner.getmembers()}

          missing_inner = sorted(
              required
              for required in required_inner
              if not any(name == required or name.endswith("/" + required) for name in inner_names)
          )
          if missing_inner:
              raise SystemExit(f"Missing packaged plug-ins: {missing_inner}")

          print(f"Verified all {len(required_inner)} manifest files")
          PY
          '

      - name: Export MKP to package folder
        run: |
          set -euo pipefail
          package_name="${PACKAGE_NAME}-${PACKAGE_VERSION}.mkp"
          output="${PACKAGE_DIR}/${package_name}"
          docker cp \
            "checkmk-mkp:/omd/sites/cmk/var/check_mk/packages_local/${package_name}" \
            "$output"
          chmod 0644 "$output"
          (
            cd "$PACKAGE_DIR"
            sha256sum "$package_name" >"${package_name}.sha256"
          )

      - name: Upload MKP artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PACKAGE_NAME }}-mkp-${{ github.run_number }}
          path: |
            ${{ env.PACKAGE_DIR }}/${{ env.PACKAGE_NAME }}-${{ env.PACKAGE_VERSION }}.mkp
            ${{ env.PACKAGE_DIR }}/${{ env.PACKAGE_NAME }}-${{ env.PACKAGE_VERSION }}.mkp.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Show Checkmk logs on failure
        if: failure()
        run: docker logs checkmk-mkp || true

      - name: Remove packaging container
        if: always()
        run: docker rm --force checkmk-mkp || true
