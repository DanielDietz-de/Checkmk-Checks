name: oxidized_backup checks

on:
  pull_request:
    paths:
      - "oxidized_backup/**"
      - ".github/workflows/oxidized_backup-ci.yml"
  push:
    branches:
      - master
    paths:
      - "oxidized_backup/**"
      - ".github/workflows/oxidized_backup-ci.yml"
  workflow_dispatch:

env:
  PACKAGE_DIR: oxidized_backup
  PACKAGE_NAME: oxidized_backup
  PACKAGE_SOURCE: oxidized_backup/src/oxidized_backup
  AGENT_PLUGIN_SOURCE: oxidized_backup/src/agents/plugins/oxidized_backup
  BAKERY_SOURCE: oxidized_backup/src/lib/python3/cmk/base/cee/plugins/bakery/oxidized_backup.py
  PACKAGE_VERSION: "1.1.0"
  PLUGIN_BASE: /omd/sites/cmk/local/lib/python3/cmk_addons/plugins
  AGENT_BASE: /omd/sites/cmk/local/share/check_mk/agents

permissions:
  contents: read

concurrency:
  group: oxidized_backup-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python syntax, security, and functional tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test tools
        run: python -m pip install --disable-pip-version-check pytest==8.4.1 ruff==0.12.4

      - name: Check for fatal Python errors
        run: >-
          ruff check --select E9,F63,F7,F82
          "$PACKAGE_SOURCE"
          "$AGENT_PLUGIN_SOURCE"
          "$BAKERY_SOURCE"
          "$PACKAGE_DIR/tools"
          "$PACKAGE_DIR/tests"

      - name: Compile Python files
        run: |
          python -m compileall -q \
            "$PACKAGE_SOURCE" \
            "$PACKAGE_DIR/tools" \
            "$PACKAGE_DIR/tests"
          python -m py_compile "$AGENT_PLUGIN_SOURCE" "$BAKERY_SOURCE"

      - name: Run functional, security, Bakery, and MKP tests
        run: pytest -q "$PACKAGE_DIR/tests"

      - name: Validate manuals and deployment templates
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          package = Path(os.environ["PACKAGE_SOURCE"])
          required = {
              "title",
              "agents",
              "catalog",
              "license",
              "distribution",
              "description",
              "inventory",
          }
          errors = []
          for path in sorted((package / "checkman").iterdir()):
              if not path.is_file():
                  continue
              keys = {
                  line.split(":", 1)[0].strip()
                  for line in path.read_text(encoding="utf-8").splitlines()
                  if line and not line[0].isspace() and ":" in line
              }
              missing = sorted(required - keys)
              if missing:
                  errors.append(f"{path}: missing {', '.join(missing)}")
          if errors:
              raise SystemExit("\n".join(errors))

          deployment = package / "deployment"
          config = json.loads(
              (deployment / "oxidized_backup.json").read_text(encoding="utf-8")
          )
          serialized = json.dumps(config).lower()
          forbidden = ("rkg", "rau", '"password"', '"token"')
          found = [value for value in forbidden if value in serialized]
          if found:
              raise SystemExit(f"Template contains forbidden values: {found}")

          hook = (deployment / "oxidized_backup-hook.yml").read_text(encoding="utf-8")
          required_hook_tokens = (
              "node_success",
              "node_fail",
              "post_store",
              "/usr/bin/oxidized_backup_hook",
              "--config /etc/check_mk/oxidized_backup.json",
          )
          missing = [token for token in required_hook_tokens if token not in hook]
          if missing:
              raise SystemExit(f"Hook template is missing: {missing}")
          PY

  checkmk-api-load:
    name: Checkmk API and Raw compatibility (${{ matrix.checkmk }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        checkmk:
          - 2.4.0p5
          - 2.4.0p34

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Start Checkmk Raw container
        env:
          CHECKMK_IMAGE: checkmk/check-mk-raw:${{ matrix.checkmk }}
        run: |
          set -euo pipefail
          docker run --detach \
            --name checkmk-ci \
            --env CMK_PASSWORD='oxidized-backup-ci-password' \
            --env CMK_SITE_ID='cmk' \
            --env PACKAGE_NAME \
            --env PACKAGE_SOURCE \
            --env AGENT_PLUGIN_SOURCE \
            --env PLUGIN_BASE \
            --env AGENT_BASE \
            --volume "$GITHUB_WORKSPACE:/work:ro" \
            "$CHECKMK_IMAGE"

          for _ in $(seq 1 120); do
            if docker logs checkmk-ci 2>&1 | grep -q '### CONTAINER STARTED'; then
              exit 0
            fi
            if ! docker inspect --format '{{.State.Running}}' checkmk-ci | grep -q true; then
              docker logs checkmk-ci
              exit 1
            fi
            sleep 2
          done

          docker logs checkmk-ci
          echo 'Checkmk container did not become ready' >&2
          exit 1

      - name: Install check, ruleset, and agent sources
        run: |
          docker exec --user root checkmk-ci bash -lc '
            set -euo pipefail
            plugin_target="${PLUGIN_BASE}/${PACKAGE_NAME}"
            install -d -o cmk -g cmk "$plugin_target"
            cp -a "/work/${PACKAGE_SOURCE}/." "$plugin_target/"
            install -D -m 0755 -o cmk -g cmk \
              "/work/${AGENT_PLUGIN_SOURCE}" \
              "${AGENT_BASE}/plugins/${PACKAGE_NAME}"
            chown -R cmk:cmk "$plugin_target"
          '

      - name: Load Checkmk plug-ins and ruleset
        run: |
          docker exec --user cmk checkmk-ci bash -lc '
            set -euo pipefail
            export PAGER=cat
            plugin_root="${PLUGIN_BASE}/${PACKAGE_NAME}"
            python3 -m compileall -q "$plugin_root"
            python3 -m py_compile "${AGENT_BASE}/plugins/${PACKAGE_NAME}"
            "${AGENT_BASE}/plugins/${PACKAGE_NAME}" --help >/dev/null

            while IFS= read -r -d "" plugin; do
              echo "Loading ${plugin#$plugin_root/}"
              python3 "$plugin"
            done < <(
              find "$plugin_root/agent_based" "$plugin_root/rulesets" \
                -type f -name "*.py" -print0 | sort -z
            )

            cmk-validate-plugins
            cmk -M oxidized_backup >/dev/null
            cmk -R
          '

      - name: Show Checkmk logs on failure
        if: failure()
        run: docker logs checkmk-ci || true

      - name: Remove temporary Checkmk container
        if: always()
        run: docker rm --force checkmk-ci || true

  mkp-package:
    name: Build, install, and inspect MKP
    needs:
      - python-tests
      - checkmk-api-load
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build deterministic MKP and checksum
        run: |
          set -euo pipefail
          python "$PACKAGE_DIR/tools/build_mkp.py" \
            --version "$PACKAGE_VERSION" \
            --repository "$GITHUB_REPOSITORY" \
            --packaged-version 2.4.0p34 \
            --output-dir "$PACKAGE_DIR"
          (
            cd "$PACKAGE_DIR"
            sha256sum --check "${PACKAGE_NAME}-${PACKAGE_VERSION}.mkp.sha256"
          )

      - name: Start clean Checkmk Raw installation container
        run: |
          set -euo pipefail
          docker run --detach \
            --name checkmk-mkp \
            --env CMK_PASSWORD='oxidized-backup-ci-password' \
            --env CMK_SITE_ID='cmk' \
            checkmk/check-mk-raw:2.4.0p34

          for _ in $(seq 1 120); do
            if docker logs checkmk-mkp 2>&1 | grep -q '### CONTAINER STARTED'; then
              exit 0
            fi
            if ! docker inspect --format '{{.State.Running}}' checkmk-mkp | grep -q true; then
              docker logs checkmk-mkp
              exit 1
            fi
            sleep 2
          done

          docker logs checkmk-mkp
          echo 'Checkmk container did not become ready' >&2
          exit 1

      - name: Copy package into clean Checkmk site
        run: |
          docker cp \
            "$PACKAGE_DIR/${PACKAGE_NAME}-${PACKAGE_VERSION}.mkp" \
            "checkmk-mkp:/tmp/${PACKAGE_NAME}-${PACKAGE_VERSION}.mkp"

      - name: Inspect, install, and enable MKP
        run: |
          docker exec --user cmk checkmk-mkp bash -lc '
            set -euo pipefail
            export PAGER=cat
            package="/tmp/${PACKAGE_NAME}-${PACKAGE_VERSION}.mkp"

            mkp inspect "$package"
            mkp add "$package"
            mkp enable "$PACKAGE_NAME" "$PACKAGE_VERSION"

            test -x "$HOME/local/share/check_mk/agents/plugins/$PACKAGE_NAME"
            test -r "$HOME/local/lib/python3/cmk_addons/plugins/$PACKAGE_NAME/bakery_common.py"
            test -r "$HOME/local/lib/python3/cmk_addons/plugins/$PACKAGE_NAME/rulesets/ruleset_${PACKAGE_NAME}_bakery.py"
            test -r "$HOME/local/lib/python3/cmk/base/cee/plugins/bakery/${PACKAGE_NAME}.py"

            python3 -m py_compile \
              "$HOME/local/share/check_mk/agents/plugins/$PACKAGE_NAME" \
              "$HOME/local/lib/python3/cmk/base/cee/plugins/bakery/${PACKAGE_NAME}.py"
            python3 -m compileall -q \
              "$HOME/local/lib/python3/cmk_addons/plugins/$PACKAGE_NAME"

            cmk-validate-plugins
            cmk -M oxidized_backup >/dev/null
            cmk -R
          '

      - name: Verify component archives independently
        run: |
          PACKAGE="$PACKAGE_DIR/${PACKAGE_NAME}-${PACKAGE_VERSION}.mkp" python - <<'PY'
          import ast
          import io
          import os
          import tarfile

          with tarfile.open(os.environ["PACKAGE"], "r:*") as outer:
              info_file = outer.extractfile("info")
              if info_file is None:
                  raise SystemExit("Unable to read MKP metadata")
              info = ast.literal_eval(info_file.read().decode("utf-8"))
              for component, required_files in info["files"].items():
                  component_file = outer.extractfile(f"{component}.tar")
                  if component_file is None:
                      raise SystemExit(f"Missing {component}.tar")
                  with tarfile.open(
                      fileobj=io.BytesIO(component_file.read()), mode="r:*"
                  ) as inner:
                      names = {member.name.removeprefix("./") for member in inner}
                  missing = sorted(set(required_files) - names)
                  if missing:
                      raise SystemExit(
                          f"Missing packaged {component} files: {missing}"
                      )
                  print(f"Verified {len(required_files)} files in {component}.tar")
          PY

      - name: Upload MKP artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PACKAGE_NAME }}-mkp-${{ github.run_number }}
          path: |
            ${{ env.PACKAGE_DIR }}/${{ env.PACKAGE_NAME }}-${{ env.PACKAGE_VERSION }}.mkp
            ${{ env.PACKAGE_DIR }}/${{ env.PACKAGE_NAME }}-${{ env.PACKAGE_VERSION }}.mkp.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Show Checkmk logs on failure
        if: failure()
        run: docker logs checkmk-mkp || true

      - name: Remove installation container
        if: always()
        run: docker rm --force checkmk-mkp || true
