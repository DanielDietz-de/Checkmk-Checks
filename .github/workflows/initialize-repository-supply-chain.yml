name: Finalize immutable repository supply chain

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "tools/ci/**"
      - "tests/test_ci_*.py"

permissions:
  contents: write

concurrency:
  group: initialize-supply-chain-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  finalize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Finalize the exact pull-request branch without external actions
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          remote_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git init .
          git remote add origin "$remote_url"

          apply_final_state() {
            python3 tools/ci/finalize_pinner.py
            cp tools/ci/pin_supply_chain_corrected.py tools/ci/pin_supply_chain.py
            cp tools/ci/repository_guard_corrected.py tools/ci/repository_guard.py
            cp tests/test_ci_tools_corrected.py tests/test_ci_tools.py
            python3 tools/ci/harden_generated_mkp.py

            rm -f \
              tools/ci/pin_supply_chain_corrected.py \
              tools/ci/repository_guard_corrected.py \
              tools/ci/harden_generated_mkp.py \
              tools/ci/finalize_pinner.py \
              tests/test_ci_tools_corrected.py \
              .github/workflows/initialize-supply-chain-lock.yml \
              .github/workflows/initialize-repository-supply-chain.yml

            python3 tools/ci/pin_supply_chain.py --write
            python3 tools/ci/pin_supply_chain.py --check
            python3 -m unittest discover -s tests -p 'test_ci_*.py' -v
          }

          for attempt in 1 2 3; do
            git fetch --depth=1 origin "$HEAD_REF"
            git reset --hard FETCH_HEAD
            apply_final_state

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add --all
            if git diff --cached --quiet; then
              echo "Repository supply chain is already finalized."
              exit 0
            fi
            git commit -m "ci: pin and harden repository workflows"
            if git push origin "HEAD:${HEAD_REF}"; then
              exit 0
            fi
            echo "Branch moved during finalization; retrying from the new head." >&2
            sleep 3
          done

          echo "Could not finalize the branch after three attempts." >&2
          exit 1
