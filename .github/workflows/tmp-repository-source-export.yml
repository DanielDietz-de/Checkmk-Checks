name: Temporary repository source export

on:
  pull_request:
    paths:
      - ".github/workflows/tmp-repository-source-export.yml"
      - ".github/scripts/**"
      - "*/src/**"

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Create source archive
        run: |
          set -euo pipefail
          tar --exclude=.git -czf /tmp/repository-source.tar.gz .
          mv /tmp/repository-source.tar.gz repository-source.tar.gz

      - name: Upload source archive
        uses: actions/upload-artifact@v7
        with:
          name: repository-source
          path: repository-source.tar.gz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
